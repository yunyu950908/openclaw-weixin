name: Auto-release on sync merge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'chore: sync @tencent-weixin/openclaw-weixin')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION)

          # 幂等性: tag 已存在就跳过 (避免 push 事件重放导致重复创建)
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists. Skipping."
            exit 0
          fi

          gh release create "v${VERSION}" \
            --target main \
            --title "v${VERSION}" \
            --notes "$(cat <<NOTES
          Synced from [\`@tencent-weixin/openclaw-weixin@${VERSION}\`](https://www.npmjs.com/package/@tencent-weixin/openclaw-weixin/v/${VERSION})

          > Auto-generated by [release workflow](../actions/workflows/release.yml).
          NOTES
          )"
          echo "Release v${VERSION} created."
