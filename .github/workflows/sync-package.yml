name: Sync openclaw-weixin package

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 运行
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for new version
        id: version_check
        run: |
          LATEST_VERSION=$(npm view @tencent-weixin/openclaw-weixin version)
          CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0")

          echo "latest=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LATEST_VERSION is already synced. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version detected: $CURRENT_VERSION -> $LATEST_VERSION"
          fi

      - name: Download and extract tarball
        if: steps.version_check.outputs.skip == 'false'
        run: |
          TARBALL_URL=$(npm view @tencent-weixin/openclaw-weixin dist.tarball)
          echo "Downloading: $TARBALL_URL"
          curl -sL "$TARBALL_URL" -o package.tgz
          tar -xzf package.tgz

      - name: Sync source code
        if: steps.version_check.outputs.skip == 'false'
        run: |
          # 保留 .git、.github、VERSION、README.md，删除其他旧文件
          find . -maxdepth 1 \
            ! -name '.' \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'VERSION' \
            ! -name 'README.md' \
            ! -name 'package' \
            ! -name 'package.tgz' \
            -exec rm -rf {} +

          # 将解压后的文件复制到仓库根目录
          cp -r package/* .
          cp -r package/.[!.]* . 2>/dev/null || true

          # 清理临时文件
          rm -rf package package.tgz

          # 更新版本号
          echo "${{ steps.version_check.outputs.latest }}" > VERSION

      - name: Create Pull Request
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST="${{ steps.version_check.outputs.latest }}"
          CURRENT="${{ steps.version_check.outputs.current }}"
          BRANCH="sync/v${LATEST}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 如果远程分支已存在，先删除
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync @tencent-weixin/openclaw-weixin v${LATEST}"
          git push -u origin "$BRANCH"

          # 关闭同前缀的旧 PR
          gh pr list --search "is:open head:sync/" --json number --jq '.[].number' | \
            xargs -I {} gh pr close {} --comment "Superseded by v${LATEST}" 2>/dev/null || true

          PR_URL=$(gh pr create \
            --title "chore: sync @tencent-weixin/openclaw-weixin v${LATEST}" \
            --body "$(cat <<EOF
          ## Summary
          - Sync npm package \`@tencent-weixin/openclaw-weixin\` from \`v${CURRENT}\` to \`v${LATEST}\`
          - Source: https://www.npmjs.com/package/@tencent-weixin/openclaw-weixin

          ## Changes
          Auto-generated by [sync-package workflow](../actions/workflows/sync-package.yml).
          EOF
          )" \
            --base main \
            --head "$BRANCH")

          echo "PR created: $PR_URL"

          # 检查是否可合并（无冲突）
          MERGEABLE=$(gh pr view "$PR_URL" --json mergeable --jq '.mergeable')
          echo "Mergeable status: $MERGEABLE"

          if [ "$MERGEABLE" = "MERGEABLE" ]; then
            gh pr review "$PR_URL" --approve
            gh pr merge "$PR_URL" --squash --delete-branch
            echo "PR merged successfully."
          else
            echo "PR has conflicts or is not mergeable. Skipping auto-merge."
          fi
